<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cryptos v3.6</title>

<style>
body{
background:#0d1117;
color:#c9d1d9;
font-family:Arial;
text-align:center;
padding:40px;
margin:0;
}

.box{
max-width:700px;
margin:auto;
background:#161b22;
padding:30px;
border-radius:15px;
}

textarea{
width:100%;
height:120px;
background:#010409;
color:#58a6ff;
font-size:18px;
padding:10px;
margin:10px 0;
box-sizing:border-box;
border:1px solid #30363d;
border-radius:6px;
font-family:'Courier New', monospace;
}

button{
padding:8px 12px;
margin:4px;
cursor:pointer;
background:#238636;
color:#fff;
border:none;
border-radius:6px;
font-size:14px;
transition:all 0.2s;
}

button:hover{
background:#2ea043;
}

button.active{
background:#58a6ff;
color:#000;
font-weight:bold;
}

.button-group{
margin:15px 0;
}

.mode-buttons button{
background:#0969da;
margin:10px 4px;
}

.mode-buttons button:hover{
background:#0860ca;
}

.mode-buttons button.active{
background:#58a6ff;
}

.copy-btn{
background:#28a745;
margin-top:10px;
width:100%;
}

.copy-btn:hover{
background:#218838;
}

.copy-success{
background:#28a745;
}

h1{
margin:0 0 20px 0;
}

.button-row{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:5px;
}

</style>

</head>

<body>

<div class="box">

<h1>🔮 CRYPTOS v3.6</h1>

<textarea id="input" placeholder="영어 입력"></textarea>

<div class="button-group">
<p style="margin:10px 0 5px 0; font-size:14px;">상황명사 선택:</p>
<div class="button-row">
<button onclick="addState('✍︎')">분노</button>
<button onclick="addState('✏︎')">해탈</button>
<button onclick="addState('📫︎')">여유</button>
<button onclick="addState('⌛︎')">피로</button>
<button onclick="addState('✁︎')">방전</button>
<button onclick="addState('😜')">위트</button>
<button onclick="addState('☺︎')">평온</button>
<button onclick="addState('❑︎')">무표정</button>
<button onclick="addState('☠︎')">위급</button>
</div>
</div>

<div class="button-group mode-buttons">
<button class="active" onclick="setMode('symbol')">기호</button>
<button onclick="setMode('sound')">발음</button>
</div>

<textarea id="output" readonly placeholder="결과가 여기 나타나요"></textarea>

<button class="copy-btn" onclick="copyOutput()">📋 결과 복사하기</button>

</div>

<script>

let mode="symbol";
let states=[];

const cryptoDict={
a:'♋︎',
b:'♌︎',
c:'♍︎',
d:'♎︎',
e:'♏︎',
f:'♐︎',
g:'♑︎',
h:'🙧',
i:'⬧︎',
j:'🙨',
k:'🙩',
l:'●︎',
m:'❍︎',
n:'⏹︎',
o:'□︎',
p:'◻︎',
q:'❑︎',
r:'❒︎',
s:'⬧︎',
t:'⧫︎',
u:'◆︎',
v:'❖︎',
w:'⬪︎',
x:'⌧︎',
y:'⍳︎',
z:'⪿'
};

const pronunciation={
a:'아',
b:'브',
c:'크',
d:'드',
e:'오',
f:'프',
g:'그',
h:'흐',
i:'이',
j:'즈',
k:'크',
l:'엘',
m:'엠',
n:'엔',
o:'오',
p:'프',
q:'큐',
r:'르',
s:'스',
t:'트',
u:'우',
v:'브',
w:'우',
x:'크스',
y:'이',
z:'즈'
};

const numDict={
'0':'X',
'1':'и',
'2':'л',
'3':'т',
'4':'Ж',
'5':'С',
'6':'б',
'7':'о',
'8':'Я',
'9':'е'
};

// 숫자 변환 함수
function encryptNumber(n){
n=parseInt(n);
n*=8;

while(n>0 && n%4===0){
n=Math.floor(n/4);
}

n=n*3+5;

let result="";

for(let x of String(n)){
result+=numDict[x];
}

return result;
}

// 상황명사 추가/제거 함수
function addState(s){
if(states.includes(s)){
states.splice(states.indexOf(s),1);
}else{
states.push(s);
}

run();
updateStateButtons();
}

// 상태 버튼 시각화 업데이트
function updateStateButtons(){
const buttons = document.querySelectorAll('.button-row button');
buttons.forEach(btn => {
const emoji = btn.textContent.split(' ')[0]; // 첫 번째 이모지 가져오기
if(states.includes(emoji)){
btn.classList.add('active');
} else {
btn.classList.remove('active');
}
});
}

// 모드 전환 함수
function setMode(newMode){
mode = newMode;
run();
updateModeButtons();
}

// 모드 버튼 시각화 업데이트
function updateModeButtons(){
const modeButtons = document.querySelectorAll('.mode-buttons button');
modeButtons.forEach(btn => {
if(btn.textContent === '기호' && mode === 'symbol'){
btn.classList.add('active');
} else if(btn.textContent === '발음' && mode === 'sound'){
btn.classList.add('active');
} else {
btn.classList.remove('active');
}
});
}

// 텍스트 변환 함수
function convert(text){
let result="";
let sound="";

for(let i=0;i<text.length;i++){
let c=text[i];

// 문장부호 유지
if(/[.,!?]/.test(c)){
result+=c;
sound+=c;
continue;
}

// 숫자
if(/[0-9]/.test(c)){
if(i===0 || text[i-1]==" ")
result+="📄︎";

result+=encryptNumber(c);
sound+=c;
}

// 문자
else if(cryptoDict[c]){
if(i===0 || text[i-1]==" ")
result+="📄︎";

result+=cryptoDict[c];
sound+=pronunciation[c];
}

// 공백
else{
result+=c;
sound+=c;
}
}

return mode==="symbol"
? result
: sound;
}

// 실행 함수
function run(){
let text=document
.getElementById("input")
.value
.toLowerCase();

let result=convert(text);

// 상황명사
if(states.length){
result+=" "+states.join("+");
}

// 출력
document
.getElementById("output")
.value=result;
}

// 복사 함수
function copyOutput(){
let output = document.getElementById("output");
let copyBtn = document.querySelector('.copy-btn');

if(output.value === ""){
alert("복사할 내용이 없어요!");
return;
}

// 텍스트 복사
navigator.clipboard.writeText(output.value).then(() => {
// 버튼 피드백
copyBtn.textContent = "✅ 복사됐어요!";
copyBtn.classList.add('copy-success');

// 2초 후 원래대로
setTimeout(() => {
copyBtn.textContent = "📋 결과 복사하기";
copyBtn.classList.remove('copy-success');
}, 2000);
}).catch(() => {
alert("복사 실패! 다시 시도해봐요.");
});
}

// 입력창에 이벤트 리스너
document
.getElementById("input")
.oninput=run;

// 초기 모드 버튼 업데이트
updateModeButtons();

</script>

</body>
</html>
